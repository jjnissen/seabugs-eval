name: SWE-bench Evaluation (x86) — Full 300 Tasks (Batched)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  evaluate-optimized:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Install SWE-bench
        run: pip install swebench datasets

      - name: Evaluate optimized (batch 1 — tasks 0-99)
        run: |
          head -100 predictions/optimized.jsonl > /tmp/batch.jsonl
          python -m swebench.harness.run_evaluation \
            --predictions_path /tmp/batch.jsonl \
            --max_workers 2 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --cache_level instance \
            --run_id seabugs-optimized-300
          docker system prune -af

      - name: Evaluate optimized (batch 2 — tasks 100-199)
        run: |
          sed -n '101,200p' predictions/optimized.jsonl > /tmp/batch.jsonl
          python -m swebench.harness.run_evaluation \
            --predictions_path /tmp/batch.jsonl \
            --max_workers 2 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --cache_level instance \
            --run_id seabugs-optimized-300
          docker system prune -af

      - name: Evaluate optimized (batch 3 — tasks 200-300)
        run: |
          tail -n +201 predictions/optimized.jsonl > /tmp/batch.jsonl
          python -m swebench.harness.run_evaluation \
            --predictions_path /tmp/batch.jsonl \
            --max_workers 2 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --cache_level instance \
            --run_id seabugs-optimized-300
          docker system prune -af

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimized-results
          path: logs/

  evaluate-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Install SWE-bench
        run: pip install swebench datasets

      - name: Evaluate baseline (batch 1 — tasks 0-99)
        run: |
          head -100 predictions/baseline.jsonl > /tmp/batch.jsonl
          python -m swebench.harness.run_evaluation \
            --predictions_path /tmp/batch.jsonl \
            --max_workers 2 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --cache_level instance \
            --run_id seabugs-baseline-300
          docker system prune -af

      - name: Evaluate baseline (batch 2 — tasks 100-199)
        run: |
          sed -n '101,200p' predictions/baseline.jsonl > /tmp/batch.jsonl
          python -m swebench.harness.run_evaluation \
            --predictions_path /tmp/batch.jsonl \
            --max_workers 2 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --cache_level instance \
            --run_id seabugs-baseline-300
          docker system prune -af

      - name: Evaluate baseline (batch 3 — tasks 200-300)
        run: |
          tail -n +201 predictions/baseline.jsonl > /tmp/batch.jsonl
          python -m swebench.harness.run_evaluation \
            --predictions_path /tmp/batch.jsonl \
            --max_workers 2 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --cache_level instance \
            --run_id seabugs-baseline-300
          docker system prune -af

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-results
          path: logs/
