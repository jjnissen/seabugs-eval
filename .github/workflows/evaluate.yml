name: SWE-bench Evaluation (x86) — Full 300 Tasks
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  evaluate-optimized:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SWE-bench
        run: pip install swebench datasets
      - name: Evaluate optimized patches (300 tasks)
        run: |
          python -m swebench.harness.run_evaluation \
            --predictions_path predictions/optimized.jsonl \
            --max_workers 4 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --run_id seabugs-optimized-300
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimized-results
          path: logs/

  evaluate-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SWE-bench
        run: pip install swebench datasets
      - name: Evaluate baseline patches (300 tasks)
        run: |
          python -m swebench.harness.run_evaluation \
            --predictions_path predictions/baseline.jsonl \
            --max_workers 4 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --run_id seabugs-baseline-300
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-results
          path: logs/
