name: SWE-bench Evaluation (x86)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  evaluate-optimized:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SWE-bench
        run: pip install swebench datasets
      - name: Evaluate optimized patches
        run: |
          python -m swebench.harness.run_evaluation \
            --predictions_path predictions/optimized.jsonl \
            --max_workers 1 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --run_id seabugs-optimized-8
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: optimized-results
          path: logs/run_evaluation/

  evaluate-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SWE-bench
        run: pip install swebench datasets
      - name: Evaluate baseline patches
        run: |
          python -m swebench.harness.run_evaluation \
            --predictions_path predictions/baseline.jsonl \
            --max_workers 1 \
            --dataset_name princeton-nlp/SWE-bench_Lite \
            --run_id seabugs-baseline-8
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: baseline-results
          path: logs/run_evaluation/
